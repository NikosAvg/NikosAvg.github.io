<p> むかし、 むかし、 ある ところ に \</p>
<p> おじいさん と おばあさん が いました。</p>
<p> おじいさん が 山（やま） へ 木（き） を きり に いけば、</p>
<p> おばあさん は 川（かわ） へ せんたく に でかけます。</p>
<p> 「おじいさん、 はよう もどって きなされ。」</p>
<p> 「おばあさん も き を つけて な。」</p> 
<p> まい日（にち） やさしく いい あって でかけます。</p>
